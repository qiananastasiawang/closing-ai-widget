<script>
let memory = {
  problem: null,
  stage: "start"
};

function send() {
  const inputEl = document.getElementById("input");
  const chat = document.getElementById("chat");
  const input = inputEl.value.trim().toLowerCase();

  if (!input) return;

  chat.innerHTML += "<p><b>You:</b> " + input + "</p>";

  let reply = "";

  // Step 1: Identify problem
  if (!memory.problem) {
    if (input.includes("acne")) {
      memory.problem = "acne";
      reply = "Got it. Is it something that just started, or has it been recurring?";
    } else if (input.includes("aging") || input.includes("wrinkle")) {
      memory.problem = "aging";
      reply = "Are you more concerned about wrinkles, or skin firmness?";
    } else {
      reply = "What are you trying to improve—skin issues or just exploring options?";
    }
  }

  // Step 2: Pain amplification
  else if (memory.stage === "start") {
    memory.stage = "pain";
    reply = "Most people ignore this early, and it usually gets worse over time.";
  }

  // Step 3: Trust
  else if (memory.stage === "pain") {
    memory.stage = "solution";
    reply = "We see this all the time—clients only improve after using the right method.";
  }

  // Step 4: Offer solution
  else if (memory.stage === "solution") {
    memory.stage = "close";
    reply = "I can show you the exact solution most people here use—it saves a lot of trial and error.";
  }

  // Step 5: Close
  else {
    reply = "👉 This is the most effective option right now:<br><a href='https://yourstore.com' target='_blank'>View Product</a>";
  }

  chat.innerHTML += "<p><b>AI:</b> " + reply + "</p>";

  inputEl.value = "";
}
</script>
