<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI That Closes Deals</title>
</head>
<body>
  <h1>AI That Closes Deals</h1>
  <p>This is not a chatbot. This is a sales AI.</p>

  <div id="chat"></div>

  <input id="input" placeholder="Tell me what you need..." />
  <button onclick="send()">Send</button>

  <script>
    let memory = {
      problem: null,
      stage: "start"
    };

    function send() {
      const inputEl = document.getElementById("input");
      const chat = document.getElementById("chat");
      const inputRaw = inputEl.value.trim();

      if (!inputRaw) return;

      const input = inputRaw.toLowerCase();
      chat.innerHTML += "<p><b>You:</b> " + inputRaw + "</p>";

      let reply = "";

      if (!memory.problem) {
        if (input.includes("acne")) {
          memory.problem = "acne";
          reply = "Got it. Is it something that just started, or has it been recurring?";
        } else if (input.includes("aging") || input.includes("wrinkle")) {
          memory.problem = "aging";
          reply = "Are you more concerned about wrinkles, or skin firmness?";
        } else {
          reply = "What are you trying to improve—skin issues or just exploring options?";
        }
      } else if (memory.stage === "start") {
        memory.stage = "pain";
        reply = "Most people ignore this early, and it usually gets worse over time.";
      } else if (memory.stage === "pain") {
        memory.stage = "solution";
        reply = "We see this all the time—clients only improve after using the right method.";
      } else if (memory.stage === "solution") {
        memory.stage = "close";
        reply = "I can show you the exact solution most people here use—it saves a lot of trial and error.";
      } else {
        reply = "👉 This is the most effective option right now: <a href='https://example.com' target='_blank'>View Product</a>";
      }

      chat.innerHTML += "<p><b>AI:</b> " + reply + "</p>";
      inputEl.value = "";
    }
  </script>
</body>
</html>
