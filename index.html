<script>
function analyzeIntent(input) {
  input = input.toLowerCase();

  // Acne
  if (
    input.includes("acne") ||
    input.includes("痘") ||
    input.includes("痘痘")
  ) return "acne";

  // Anti-aging
  if (
    input.includes("aging") ||
    input.includes("抗老") ||
    input.includes("wrinkle")
  ) return "aging";

  // Price
  if (
    input.includes("price") ||
    input.includes("贵") ||
    input.includes("便宜")
  ) return "price";

  return "general";
}

async function fakeAI(input) {
  const intent = analyzeIntent(input);

  if (intent === "acne") {
    return "Acne issues usually get worse without proper care. 痘痘如果不处理，会越来越严重。";
  }

  if (intent === "price") {
    return "Price matters—but效果更重要。便宜的东西很多时候更贵（因为没效果）。";
  }

  if (intent === "aging") {
    return "Anti-aging需要长期策略，不是一个产品能解决的。";
  }

  return "Tell me more about your situation — 我帮你分析最合适的方案。";
}
</script>
