<script>
let state = "hook";

function analyzeIntent(input) {
  input = input.toLowerCase();

  if (input.includes("acne")) return "acne";
  if (input.includes("aging")) return "aging";
  if (input.includes("price") || input.includes("cheap")) return "price";
  if (input.includes("not sure")) return "hesitation";

  return "general";
}

function send() {
  const inputEl = document.getElementById("input");
  const chat = document.getElementById("chat");
  const input = inputEl.value.trim();
  if (!input) return;

  const intent = analyzeIntent(input);
  let reply = "";

  // 🔥 关键：第一句话就利用用户输入
  if (state === "hook") {
    if (intent === "acne") {
      reply = "Got it — acne is one of the most common issues. Has it been ongoing for a while?";
      state = "pain";
    } else if (intent === "aging") {
      reply = "Understood — most people notice aging signs getting worse over time. Is that what you're seeing?";
      state = "pain";
    } else {
      reply = "Got it — what’s the main thing you want to improve?";
      state = "qualify";
    }
  }

  else if (state === "qualify") {
    reply = "Is your priority faster results, better quality, or lower price?";
    state = "pain";
  }

  else if (state === "pain") {
    reply = "That’s exactly what most people experience before they find the right solution.";
    state = "solution";
  }

  else if (state === "solution") {
    reply = "Based on what you told me, this is what most people choose — it targets the root cause and works quickly.";
    state = "objection";
  }

  else if (state === "objection") {
    if (intent === "price") {
      reply = "I get that — but most people realize it's cheaper than trying multiple products that don’t work.";
    } else {
      reply = "That’s exactly what others thought before they tried it.";
    }
    state = "close";
  }

  else {
    reply = "👉 This is the best option for you: https://example.com";
  }

  chat.innerHTML += "<p><b>You:</b> " + input + "</p>";
  chat.innerHTML += "<p><b>AI:</b> " + reply + "</p>";

  inputEl.value = "";
}
</script>
