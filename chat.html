<script>
var memory = {
  problem: null,
  step: 0
};

document.getElementById("sendBtn").onclick = function () {

  var inputEl = document.getElementById("input");
  var chat = document.getElementById("chat");
  var inputRaw = inputEl.value.trim();

  if (!inputRaw) return;

  chat.innerHTML += "<p><b>You:</b> " + inputRaw + "</p>";

  var input = inputRaw.toLowerCase();
  var reply = "";

  // STEP 0: detect problem
  if (!memory.problem) {
    if (input.includes("acne")) {
      memory.problem = "acne";
    } else if (input.includes("aging") || input.includes("wrinkle")) {
      memory.problem = "aging";
    } else {
      memory.problem = "general";
    }

    memory.step = 1;

    reply = "Most people come here after wasting months on the wrong products. What are you trying to fix?";

  }

  // STEP 1 → 2
  else if (memory.step === 1) {
    memory.step = 2;

    reply = "That’s exactly how it starts. The longer you wait, the harder it becomes.";
  }

  // STEP 2 → 3
  else if (memory.step === 2) {
    memory.step = 3;

    reply = "We see this all the time—people only improve once they switch to the right approach.";
  }

  // STEP 3 → 4
  else if (memory.step === 3) {
    memory.step = 4;

    reply = "I can show you what actually works so you don’t waste time guessing.";
  }

  // STEP 4 → 5 (CLOSE)
  else {
    reply = "👉 This is what most people use to fix this fast:<br><a href='https://yourstore.com' target='_blank'>See the solution</a>";
  }

  chat.innerHTML += "<p><b>AI:</b> " + reply + "</p>";

  inputEl.value = "";
};
</script>
